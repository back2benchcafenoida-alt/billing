<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe POS Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; /* Softer, premium background */
            -webkit-font-smoothing: antialiased;
        }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Professional Logo Container */
        #appLogo { 
            height: 48px; 
            width: auto; 
            max-width: 160px;
            object-fit: contain; 
            display: none; /* Hidden until loaded to prevent broken image icon */
        }
        
        /* Custom Scrollbar for Cart */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="pb-20 text-slate-800">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-4">
                    <img id="appLogo" src="" alt="Brand Logo">
                    <h1 id="navBrand" class="font-bold text-xl tracking-tight text-slate-900 border-l-2 pl-4 border-slate-200">CAFE POS</h1>
                </div>
                <div class="flex gap-1 sm:gap-2">
                    <button onclick="showTab('pos')" class="px-3 py-2 rounded-md text-sm font-semibold text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition-colors">Billing</button>
                    <button onclick="showTab('menu')" class="px-3 py-2 rounded-md text-sm font-semibold text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition-colors">Menu</button>
                    <button onclick="showTab('settings')" class="px-3 py-2 rounded-md text-sm font-semibold text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition-colors">Settings</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <section id="pos" class="tab-content active-tab">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
                <div class="lg:col-span-8">
                    <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        Quick Add
                    </h2>
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3 md:gap-4" id="posGrid">
                        </div>
                </div>

                <div class="lg:col-span-4 flex flex-col h-[calc(100vh-8rem)] sticky top-24">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
                        <div class="p-5 border-b border-slate-100 bg-slate-50/50">
                            <h2 class="font-bold text-slate-900 mb-4">Current Order</h2>
                            <div class="space-y-3">
                                <input type="text" id="cName" placeholder="Customer Name (Optional)" class="w-full border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg sm:text-sm p-2.5 border outline-none transition-all">
                                <input type="tel" id="cMob" placeholder="Mobile Number (Optional)" class="w-full border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg sm:text-sm p-2.5 border outline-none transition-all">
                            </div>
                        </div>
                        
                        <div id="cartDisplay" class="flex-1 overflow-y-auto p-5 space-y-3 custom-scroll text-sm">
                            <div class="text-center text-slate-400 mt-10 text-sm">Cart is empty</div>
                        </div>

                        <div class="p-5 border-t border-slate-100 bg-slate-50">
                            <div class="flex justify-between items-center text-slate-600 mb-2 text-sm">
                                <span>Subtotal</span>
                                <span>₹<span id="gTotalSub">0</span></span>
                            </div>
                            <div class="flex justify-between items-end text-xl font-black text-slate-900 mb-5">
                                <span>Total</span>
                                <span class="text-indigo-600">₹<span id="gTotal">0</span></span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="clearCart()" class="px-4 py-3 bg-red-50 text-red-600 rounded-xl font-semibold hover:bg-red-100 transition-colors">Clear</button>
                                <button onclick="printBill()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md shadow-indigo-200 hover:bg-indigo-700 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                                    PRINT BILL
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="menu" class="tab-content max-w-3xl mx-auto">
            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold text-slate-900 mb-6 border-b pb-4">Manage Menu Items</h2>
                <div class="flex flex-col sm:flex-row gap-3 mb-8 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <input type="text" id="iName" placeholder="Item Name (e.g. Cappuccino)" class="flex-1 border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg p-2.5 border outline-none">
                    <div class="relative">
                        <span class="absolute left-3 top-2.5 text-slate-400 font-medium">₹</span>
                        <input type="number" id="iPrice" placeholder="Price" class="w-full sm:w-32 pl-8 border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg p-2.5 border outline-none">
                    </div>
                    <button onclick="saveItem()" class="bg-emerald-600 text-white px-6 py-2.5 rounded-lg font-bold shadow-sm hover:bg-emerald-700 active:scale-[0.98] transition-all whitespace-nowrap">Add Item</button>
                </div>
                <div id="itemList" class="divide-y divide-slate-100"></div>
            </div>
        </section>

        <section id="settings" class="tab-content max-w-2xl mx-auto">
            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200 space-y-5">
                <h2 class="text-xl font-bold text-slate-900 mb-6 border-b pb-4">Business Configuration</h2>
                <div class="space-y-4">
                    <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Cafe Name</label><input type="text" id="sBrand" class="w-full border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg p-3 border outline-none transition-all"></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">FSSAI Number</label><input type="text" id="sFssai" class="w-full border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg p-3 border outline-none transition-all"></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Phone Number</label><input type="text" id="sMob" class="w-full border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg p-3 border outline-none transition-all"></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Store Address</label><input type="text" id="sAddr" class="w-full border-slate-200 shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-lg p-3 border outline-none transition-all"></div>
                </div>
                <div class="pt-4">
                    <button onclick="saveSettings()" class="w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-slate-800 active:scale-[0.98] transition-all">SAVE ALL CHANGES</button>
                </div>
            </div>
        </section>
    </div>

        let items = JSON.parse(localStorage.getItem('pos_items')) || [];

        window.onload = () => {

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(t).classList.add('active-tab');
            window.scrollTo(0,0);
        }

        function loadConfig() {
            document.getElementById('navBrand').innerText = config.name || "CAFE POS";
            document.getElementById('sBrand').value = config.name;
            document.getElementById('sFssai').value = config.fssai;
            document.getElementById('sMob').value = config.mob;
            document.getElementById('sAddr').value = config.addr;
        }

        function saveSettings() {
            config = { 
                name: document.getElementById('sBrand').value.trim(), 
                fssai: document.getElementById('sFssai').value.trim(), 
                mob: document.getElementById('sMob').value.trim(), 
                addr: document.getElementById('sAddr').value.trim() 
            };
            localStorage.setItem('pos_config', JSON.stringify(config));
            loadConfig(); 
            alert("✅ Settings Saved Successfully!");
        }

                return;
            }
            items.push({name: n, price: parseInt(p)});
            localStorage.setItem('pos_items', JSON.stringify(items));
            render(); 
            document.getElementById('iName').value = ""; 
            document.getElementById('iPrice').value = "";
            document.getElementById('iName').focus();
        }

        function render() {
            // Render POS Buttons
            const grid = document.getElementById('posGrid');
            if(items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center p-8 text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-200">No items in menu. Go to Menu tab to add items.</div>`;
            } else {
                grid.innerHTML = items.map((it, idx) => `
                    <button onclick="add(${idx})" class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-left hover:border-indigo-400 hover:shadow-md hover:-translate-y-0.5 transition-all active:scale-95 group">
                        <div class="font-bold text-slate-800 group-hover:text-indigo-700 transition-colors leading-tight mb-1">${it.name}</div>
                        <div class="text-indigo-600 font-semibold text-sm">₹${it.price}</div>
                    </button>`).join('');
            }
            
            // Render Menu List
            document.getElementById('itemList').innerHTML = items.map((it, idx) => `
                <div class="flex justify-between items-center py-4 hover:bg-slate-50 transition-colors px-2 -mx-2 rounded-lg">
                    <div>
                        <div class="font-bold text-slate-800">${it.name}</div>
                        <div class="text-sm text-slate-500 font-medium">₹${it.price}</div>
                    </div>
                    <button onclick="del(${idx})" class="text-red-500 text-xs font-bold uppercase tracking-wider bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-md transition-colors">Delete</button>
                </div>`).join('');
        }

        function add(idx) { 
            const item = items[idx];
            // Check if item already exists in cart
            const existingItem = cart.find(c => c.item.name === item.name);
            if(existingItem) {
                existingItem.qty++;
            } else {
                cart.push({ item: item, qty: 1 });
            }
            updateCart(); 
        }

        function del(idx) { 
            if(confirm(`Are you sure you want to delete ${items[idx].name}?`)) { 
                items.splice(idx,1); 
                localStorage.setItem('pos_items', JSON.stringify(items)); 
                render(); 
            } 
        }

        function updateCart() {
            let t = 0;
            const display = document.getElementById('cartDisplay');
            
            if(cart.length === 0) {
                display.innerHTML = '<div class="text-center text-slate-400 mt-10 text-sm">Cart is empty</div>';
            } else {
                display.innerHTML = cart.map((c, i) => { 
                    const lineTotal = c.item.price * c.qty;
                    t += lineTotal; 
                    return `
                    <div class="flex justify-between items-center bg-white p-2 border border-slate-100 rounded-lg shadow-sm">
                        <div class="flex-1">
                            <div class="font-bold text-slate-800">${c.item.name}</div>
                            <div class="text-xs text-slate-500">₹${c.item.price} x ${c.qty}</div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="font-bold text-slate-900">₹${lineTotal}</span>
                            <div class="flex flex-col gap-1">
                                <button onclick="changeQty(${i}, 1)" class="w-6 h-6 bg-slate-100 rounded text-slate-600 hover:bg-slate-200 font-bold leading-none">+</button>
                                <button onclick="changeQty(${i}, -1)" class="w-6 h-6 bg-slate-100 rounded text-slate-600 hover:bg-slate-200 font-bold leading-none">-</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }
            document.getElementById('gTotalSub').innerText = t;
            document.getElementById('gTotal').innerText = t;
        }

        function changeQty(index, amount) {
            cart[index].qty += amount;
            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
            }
            updateCart();
        }

        function clearCart() {
            if(cart.length > 0 && confirm("Clear the current order?")) {
                cart = [];
                updateCart();
                document.getElementById('cName').value = "";
                document.getElementById('cMob').value = "";
            }
        }

        async function printBill() {
            if(cart.length === 0) {
                alert("Cannot print an empty bill. Please add items to the cart.");
                return; 
            }
            
            const n = document.getElementById('cName').value || "Guest";
            const m = document.getElementById('cMob').value || "N/A";
            const total = document.getElementById('gTotal').innerText;
            
            // Build ESC/POS String
            let text = `\x1b\x40\x1b\x61\x01\x1b\x45\x01${config.name.toUpperCase()}\x1b\x45\x00\n`;
            if(config.addr) text += `${config.addr}\n`;
            if(config.mob) text += `Tel: ${config.mob}\n`;
            if(config.fssai) text += `FSSAI: ${config.fssai}\n`;
            text += `--------------------------------\n\x1b\x61\x00`; // Align Left
            text += `Date: ${new Date().toLocaleString()}\nCust: ${n}\nMob:  ${m}\n`;
            text += `--------------------------------\n`;
            text += `ITEM                 QTY   TOTAL\n`;
            text += `--------------------------------\n`;
            
            // Professional Item Columns (Name up to 18 chars, Qty 4 chars, Total 8 chars = 30 chars total + spaces)
            cart.forEach(c => { 
                let nameStr = c.item.name.substring(0, 18).padEnd(18);
                let qtyStr = c.qty.toString().padStart(4);
                let totalStr = (c.item.price * c.qty).toString().padStart(8);
                text += `${nameStr} ${qtyStr} ${totalStr}\n`; 
            });
            
            text += `--------------------------------\n`;
            text += `\x1b\x45\x01GRAND TOTAL:` + `RS ${total}`.padStart(20) + `\x1b\x45\x00\n\n`;
            text += `\x1b\x61\x01Thank You! Visit Again\n\n\n\n\n\x1d\x56\x00`;

            try {
                const dev = await navigator.bluetooth.requestDevice({ 
                    filters: [{ namePrefix: 'Everycom' }, { namePrefix: 'BT' }, { namePrefix: 'Printer' }, { namePrefix: 'MTP' }], 
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', '0000ff00-0000-1000-8000-00805f9b34fb'] 
                });
                const srv = await dev.gatt.connect();
                let svc; 
                try { 
                    svc = await srv.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb'); 
                } catch { 
                    svc = await srv.getPrimaryService('0000ff00-0000-1000-8000-00805f9b34fb'); 
                }
                const chs = await svc.getCharacteristics();
                const wr = chs.find(c => c.properties.write || c.properties.writeWithoutResponse);
                
                // Chunk data for older Bluetooth printers
                const encoder = new TextEncoder();
                const data = encoder.encode(text);
                const chunkSize = 100;
                for (let i = 0; i < data.length; i += chunkSize) {
                    await wr.writeValue(data.slice(i, i + chunkSize));
                }

                // Reset Cart on success
                cart = []; 
                updateCart();
                document.getElementById('cName').value = "";
                document.getElementById('cMob').value = "";
                
            } catch (e) { 
                console.error(e);
                // User cancelled or bluetooth error. Don't clear cart so they don't lose the order.
                if(e.name !== 'NotFoundError') {
                    alert("Printer Error: Make sure your Bluetooth printer is paired and turned on.\n\nDetails: " + e.message); 
                }
            }
        }
    </script>
</body>
