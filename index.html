<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back 2 Bench | Advanced POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        /* LOGO BOX */
        .logo-container { display: flex; align-items: center; justify-content: center; width: 140px; height: 100px; overflow: visible; }
        #appLogo { height: 120px !important; width: 180px !important; object-fit: contain; transform: scale(1.5); display: block; }

        .tab-content { display: none; }
        .active-tab { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* PREVIEW MODAL */
        #previewModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .receipt-paper { background: white; width: 300px; padding: 20px; font-family: monospace; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="pb-10">

    <div id="previewModal">
        <div class="receipt-paper">
            <div id="receiptContent" class="text-[12px] leading-tight"></div>
            <div class="mt-6 flex gap-2">
                <button onclick="closePreview()" class="flex-1 bg-slate-200 py-2 rounded font-bold text-xs">CLOSE</button>
                <button onclick="executePrint()" class="flex-1 bg-black text-white py-2 rounded font-bold text-xs">PRINT NOW</button>
            </div>
        </div>
    </div>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-32">
            <div class="flex items-center gap-8">
                <div class="logo-container"><img id="appLogo" src="" alt="Logo"></div>
                <h1 id="navBrand" class="font-extrabold text-2xl tracking-tighter text-slate-900 uppercase italic">BACK 2 BENCH</h1>
            </div>
            <div class="flex gap-1 bg-slate-100 p-1 rounded-xl overflow-x-auto">
                <button onclick="showTab('pos')" class="px-5 py-2 rounded-lg text-xs font-bold hover:bg-white shadow-sm transition-all">Billing</button>
                <button onclick="showTab('menu')" class="px-5 py-2 rounded-lg text-xs font-bold hover:bg-white transition-all">Items</button>
                <button onclick="showTab('sales')" class="px-5 py-2 rounded-lg text-xs font-bold hover:bg-white transition-all text-indigo-600">Sales</button>
                <button onclick="showTab('settings')" class="px-5 py-2 rounded-lg text-xs font-bold hover:bg-white transition-all">Store</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 mt-4">
        
        <section id="pos" class="tab-content active-tab">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-7"><div class="grid grid-cols-2 md:grid-cols-3 gap-4" id="posGrid"></div></div>
                <div class="lg:col-span-5">
                    <div class="bg-white p-8 rounded-3xl border border-slate-200 sticky top-40">
                        <div class="flex justify-between mb-6">
                            <h2 class="font-black text-lg uppercase">Cart</h2>
                            <button onclick="clearCart()" class="text-xs font-bold text-red-400">RESET</button>
                        </div>
                        <input type="text" id="cName" placeholder="Customer Name" class="w-full bg-slate-50 p-4 rounded-xl font-bold mb-3 outline-none border-none">
                        <input type="tel" id="cMob" placeholder="Mobile" class="w-full bg-slate-50 p-4 rounded-xl font-bold mb-6 outline-none border-none">
                        <div id="cartDisplay" class="space-y-3 mb-8 max-h-[300px] overflow-y-auto"></div>
                        <div class="flex justify-between items-center mb-6 border-t pt-4">
                            <span class="font-bold text-slate-400">TOTAL</span>
                            <span class="text-4xl font-black italic">₹<span id="gTotal">0</span></span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="previewBill()" class="flex-1 bg-slate-100 py-5 rounded-2xl font-black hover:bg-slate-200 transition-all">PREVIEW</button>
                            <button onclick="executePrint()" class="flex-[2] bg-black text-white py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">PRINT BILL</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="sales" class="tab-content max-w-4xl mx-auto">
            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black">Sales History</h2>
                    <button onclick="clearSales()" class="text-xs text-red-500 font-bold border border-red-100 px-4 py-2 rounded-lg">Wipe Data</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-slate-400 text-[10px] font-black uppercase tracking-widest border-b">
                            <tr><th class="py-4">Time</th><th>Customer</th><th>Items</th><th class="text-right">Total</th></tr>
                        </thead>
                        <tbody id="salesTable" class="text-sm font-bold divide-y divide-slate-50">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="menu" class="tab-content max-w-2xl mx-auto">
            <div class="bg-white p-8 rounded-3xl border">
                <h2 class="text-2xl font-black mb-6">Menu</h2>
                <div class="flex gap-2 mb-8">
                    <input type="text" id="iName" placeholder="Item" class="flex-1 bg-slate-50 p-4 rounded-xl font-bold">
                    <input type="number" id="iPrice" placeholder="₹" class="w-24 bg-slate-50 p-4 rounded-xl font-bold">
                    <button onclick="saveItem()" class="bg-indigo-600 text-white px-8 rounded-xl font-black">Add</button>
                </div>
                <div id="itemList" class="divide-y"></div>
            </div>
        </section>

        <section id="settings" class="tab-content max-w-2xl mx-auto">
            <div class="bg-white p-8 rounded-3xl border space-y-4">
                <h2 class="text-2xl font-black mb-4">Store Profile</h2>
                <input type="text" id="sBrand" placeholder="Cafe Name" class="w-full bg-slate-50 p-4 rounded-xl font-bold">
                <input type="text" id="sFssai" placeholder="FSSAI Number" class="w-full bg-slate-50 p-4 rounded-xl font-bold">
                <input type="text" id="sMob" placeholder="Phone" class="w-full bg-slate-50 p-4 rounded-xl font-bold">
                <input type="text" id="sAddr" placeholder="Address" class="w-full bg-slate-50 p-4 rounded-xl font-bold">
                <button onclick="saveSettings()" class="w-full bg-slate-900 text-white py-5 rounded-xl font-black">Save Changes</button>
            </div>
        </section>
    </main>

        let items = JSON.parse(localStorage.getItem('pos_items')) || [];
        let config = JSON.parse(localStorage.getItem('pos_config')) || { name: "BACK 2 BENCH", fssai: "", mob: "", addr: "" };
        let sales = JSON.parse(localStorage.getItem('pos_sales')) || [];
        let cart = {};

        window.onload = () => {
            if(MY_LOGO_BASE64 && MY_LOGO_BASE64 !== "PASTE_HERE") document.getElementById('appLogo').src = MY_LOGO_BASE64;
            loadConfig(); render(); renderSales();
        };

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-tab'));
            document.getElementById(t).classList.add('active-tab');
        }

        function loadConfig() {
            document.getElementById('navBrand').innerText = config.name;
            document.getElementById('sBrand').value = config.name;
            document.getElementById('sFssai').value = config.fssai;
            document.getElementById('sMob').value = config.mob;
            document.getElementById('sAddr').value = config.addr;
        }

        function saveSettings() {
            config = { name: document.getElementById('sBrand').value, fssai: document.getElementById('sFssai').value, mob: document.getElementById('sMob').value, addr: document.getElementById('sAddr').value };
            localStorage.setItem('pos_config', JSON.stringify(config));
            loadConfig(); alert("Settings Saved!");
        }

        function saveItem() {
            const n = document.getElementById('iName').value.trim();
            const p = document.getElementById('iPrice').value;
            if(!n || !p) return;
            items.push({name: n, price: parseInt(p)});
            localStorage.setItem('pos_items', JSON.stringify(items));
            render(); document.getElementById('iName').value = ""; document.getElementById('iPrice').value = "";
        }

        function render() {
            const grid = document.getElementById('posGrid');
            grid.innerHTML = items.map((it, idx) => `
                <button onclick="addToCart('${it.name}', ${it.price})" class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm text-left hover:border-black hover:shadow-xl transition-all">
                    <div class="font-bold text-lg">${it.name}</div>
                    <div class="text-indigo-600 font-black italic">₹${it.price}</div>
                </button>`).join('');
            
            document.getElementById('itemList').innerHTML = items.map((it, idx) => `
                <div class="flex justify-between items-center py-4"><div class="font-bold">${it.name} - ₹${it.price}</div>
                <button onclick="items.splice(${idx},1); localStorage.setItem('pos_items', JSON.stringify(items)); render();" class="text-red-500 bg-red-50 px-4 py-2 rounded-xl text-xs font-bold">Delete</button></div>`).join('');
        }

        function addToCart(name, price) {
            if(cart[name]) { cart[name].qty += 1; } else { cart[name] = { price: price, qty: 1 }; }
            updateCart();
        }

        function updateCart() {
            let t = 0;
            const display = document.getElementById('cartDisplay');
            display.innerHTML = "";
            for (let name in cart) {
                let lineTotal = cart[name].price * cart[name].qty;
                t += lineTotal;
                display.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                        <div class="font-black text-slate-800 text-sm">${name} x${cart[name].qty}</div>
                        <div class="font-black text-black">₹${lineTotal} <button onclick="delete cart['${name}']; updateCart();" class="ml-2 text-red-300">✕</button></div>
                    </div>`;
            }
            document.getElementById('gTotal').innerText = t;
        }

        function clearCart() { cart = {}; updateCart(); }

        function generateReceiptString() {
            const n = document.getElementById('cName').value || "GUEST";
            const m = document.getElementById('cMob').value || "N/A";
            const total = document.getElementById('gTotal').innerText;
            let text = `<div class="text-center font-bold mb-2">${config.name.toUpperCase()}</div>`;
            text += `<div class="text-center mb-2">${config.addr}<br>FSSAI: ${config.fssai}</div>`;
            text += `--------------------------<br>`;
            text += `CUST: ${n}<br>MOB:  ${m}<br>DATE: ${new Date().toLocaleString()}<br>`;
            text += `--------------------------<br>`;
            for (let name in cart) {
                let lineTotal = cart[name].price * cart[name].qty;
                text += `<div class="flex justify-between"><span>${name} x${cart[name].qty}</span><span>${lineTotal}</span></div>`;
            }
            text += `--------------------------<br>`;
            text += `<div class="flex justify-between font-bold text-lg"><span>TOTAL</span><span>RS ${total}</span></div><br>`;
            text += `<div class="text-center">THANK YOU! VISIT AGAIN</div>`;
            return text;
        }

        function previewBill() {
            if(Object.keys(cart).length === 0) return alert("Cart is Empty!");
            document.getElementById('receiptContent').innerHTML = generateReceiptString();
            document.getElementById('previewModal').style.display = 'flex';
        }

        function closePreview() { document.getElementById('previewModal').style.display = 'none'; }

        function renderSales() {
            const table = document.getElementById('salesTable');
            table.innerHTML = sales.slice().reverse().map(s => `
                <tr>
                    <td class="py-4 text-[10px] text-slate-400">${s.date}</td>
                    <td>${s.name}</td>
                    <td>${s.items} items</td>
                    <td class="text-right text-indigo-600 font-black">₹${s.total}</td>
                </tr>
            `).join('');
        }

        function clearSales() { if(confirm("Clear all history?")) { sales = []; localStorage.setItem('pos_sales', JSON.stringify(sales)); renderSales(); } }

        async function executePrint() {
            if(Object.keys(cart).length === 0) return;
            const n = document.getElementById('cName').value || "Guest";
            const total = document.getElementById('gTotal').innerText;
            
            // AUTO SAVE TO HISTORY
            sales.push({ date: new Date().toLocaleString(), name: n, items: Object.keys(cart).length, total: total });
            localStorage.setItem('pos_sales', JSON.stringify(sales));
            renderSales();

            // GENERATE THERMAL STRING
            let text = `\x1b\x40\x1b\x61\x01\x1b\x45\x01${config.name.toUpperCase()}\x1b\x45\x00\n${config.addr}\nTel: ${config.mob}\n--------------------------------\n\x1b\x61\x00`;
            text += `CUST: ${n}\nMOB:  ${document.getElementById('cMob').value || "N/A"}\nDATE: ${new Date().toLocaleString()}\n--------------------------------\n`;
            for (let name in cart) { text += name.padEnd(20).substring(0,20) + (cart[name].price * cart[name].qty).toString().padStart(12) + "\n"; }
            text += `--------------------------------\nTOTAL:`.padEnd(20) + ("RS " + total).padStart(12) + `\n\n\x1b\x61\x01Thank You! Visit Again\n\n\n\n\n\x1d\x56\x00`;

            try {
                const dev = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'Everycom' }, { namePrefix: 'BT' }, { namePrefix: 'Printer' }], optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', '0000ff00-0000-1000-8000-00805f9b34fb'] });
                const srv = await dev.gatt.connect();
                let svc; try { svc = await srv.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb'); } catch { svc = await srv.getPrimaryService('0000ff00-0000-1000-8000-00805f9b34fb'); }
                const chs = await svc.getCharacteristics();
                const wr = chs.find(c => c.properties.write || c.properties.writeWithoutResponse);
                const encoder = new TextEncoder();
                const buffer = encoder.encode(text);
                const chunkSize = 20; 
                for (let i = 0; i < buffer.length; i += chunkSize) { await wr.writeValue(buffer.slice(i, i + chunkSize)); }
                clearCart(); closePreview();
            } catch (e) { alert("Printer Error: " + e.message); }
        }
    </script>
</body>
